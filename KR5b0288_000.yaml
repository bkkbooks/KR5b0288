front:
  text: 太上三辟五解祕法楚大夫隱地八術通仙正道五五
  hash: sha256:3a0eb5315d0f5f77c63192261e643020a0827ecc963ee29631f308fbaa3bc81c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0288_HFL_000-001a, image: hfl/0323/0323-020.png}
body:
  text: 弄神出身法凡此五者皆可超凡入聖若從門入從前一門二門則可長生是使寒暑不侵從三門則可以返本還元是以死而不忘者壽若從四門五門則可以脫離五行不生不滅是曰知空不空知色不色凡於五門之中得道皆在乎十二時中背境觀心則限數無窮矣弄神出身先於甲子日沭浴更衣夜半子時入室靜坐焚香面南坐存握固叩齒二十四通鳴天鼓二十四下却足平坐想下丹田有氣珠一寸三分人名曰嬰兒在氣珠中豁然而去衝華蓋度重樓十二過二竅出泥丸分頂門中而出立遂有紫雲黃霧氤氲覆蓋然後欵欵移步下至面前而立望漸想能長大如一二歲小童子與自已模樣面貌一般不可久久顧視他只恐為外境所奪便却再想騰身從頂門泥丸而入再下二竅度重樓華蓋仍入玄珠之中如此為第一度任便行住坐卧常以氣為神毋神為氣子神氣不散子母相守如雞抱卵凡一箇月後便想與自已長短大小一同漸能出入往來行步與人言語若便能行胎息住氣之道則功尤其捷徑而成就也此道成功亦可以長生也此道法若放弄純熟却於庚申日鑄大鏡一面闊五寸常令照身想與鏡中身己形狀一般面貌衣服皆與相似逐日子午二時作用調弄形已在於鏡中如此放弄純熟則自然形神俱妙分軀散形閃在鏡中自己能身外有身與道合真尸解竹杖法先於五月五日午時用五姓失火人家燒著木柴頭一假三寸面北以酒脯各五分祭之祝曰吾今以吉日正時取木中之精火中之星雕刻身貌同狀吾形綵衣絳囊酒脯將誠仗汝之靈代吾之名超生度死共保長生急急如太上三官五帝令敕年紀歲再念前呪七遍吸北氣三口吹之木人身上其木以手把定搖動之却便仍前收絳囊之中凡常日夜想自己形骸言語去就在木人身上凡三箇本命日如前呪行持則木人自然通靈便能使得出入往來如神若遇大限死至之日則木人代替身死也此法未能隱形遁世人鬼莫見赴火及水皆不能害穿雲透石與道合真然解之道金木水火土五行道備俱不能死自然免離也此法與竹杖一同凡取竹杖五月五日午時於茂林中採竹一截與自己身形長短一般不問青紫竹皆可用之亦須避忌穢惡去處其道則易成與前法行持一般投胎換舍夫修真之大必先欲延壽綿神固氣則可以成仙得道自此而始稍若形骸枯槁精魄失喪死期將至曷能長生久視之道也悲乎太古之時有超生度世之士後世淺惡一切世人貪色好欲喪身失命而不知已是以聖人垂視出世之方便後學晚進之士則有超凡入聖換殼移軀亦不失期則於生生化化湛然常存感而遂通也凡欲投胎須是婦人方娠三月已前未成形時將言語調和産母心意悅肯與我受胎亦要産母無諸疾病然後以自己旦暮存想去其胎中溫存候得十月滿足才欲分娩便調弄自己神出放行卒逝日時此處順寂彼處受生須是前假弄身出神功夫令純熟神氣不散寂靜常守然後感而遂通萬無一失一全得後澄湛自然不誤移舍之法無出於此也右為五解坐脫立亡拗程住世避死法凡人身中左有青龍右有白虎前有朱雀後有玄武在吾左右不得逺去吾若得道和汝上升再以手撫額三下扣齒三通呼上尸彭質以手撫胸七下叩齒七通次呼中尸彭居以手橅腰十下叩齒十通又呼下尸彭矯汝等在吾宅舍之中不得逺去吾若得道和汝冲玄自然成仙叩齒二十一通念吾身上有三百六十骨節神八萬四千毛竅神一萬三千精光神一萬二千形神七十二候水火風土神宿衛太乙使者臍中太乙君上丹田赤子君中丹田靈真君下丹田育嬰兒真君汝等神真常令吾道亨莫令吾愚癡與昏迷常令吾照見鏡耳不聽惡聲鼻不聞臭氣舌不了惡味使吾白日上升吾今日大限來臨仗汝神真各自守衛呪訖叩齒四十通然後定神息意想丹田中有赤氣鳳口內迸出火車自左脅出身外左繞自身又想臍中有黑龍口內流出水輪亦奔身外右繞自身左右交加周回於身如火山水海周匝其身若能放弄神出頂而立但只望空去神再歸身中不出不入其息綿綿神之與氣相守在軀殼中其二鬼若來但見火車水車如大鐵圍山其鬼不見不知或再三再四而來聽呼大罵踊躍馳驟來之不得遂退去此乃第一遍也如此七日又覺腹痛再如前法行用若能行符法籙即請將吏神符同共守護尤佳如此二七日內三次避之此方名為軃限一次至一紀年再凖前次來若於一紀之中辦道行氣隂鬼自退如此三次軃免隂籍除名南宫注生名應北斗永為真官終無世厄與道合真金解符庚辛月庚辛日庚辛時於靜室中焚香面西丁立用朱書符一道正西念呪七遍取氣七口吹在符上香煙度過閉口窨氣用淨水七口咽之呪曰庚辛之神白虎潜名西方威德藏鬼幽冥吾身是火剛金絶靈急急如律令攝右念呪訖取南氣一口吹劔上分身不損又念呪七遍訪之用劎指急便行不得回顧千里無踪跡人只見自割死此是金解之法須如法志誠齊戒受持四十九日方可用功切勿令人見恐泄漏聖將也木解符甲乙月甲乙日甲乙時於靜室焚香一爐淨水著燈面東方丁立叩齒三十六通呪七遍朱書符一道閉目窨氣一口吞下淨水咽之呪曰東方甲乙金火熒惑青龍代名木精氣足吾身是金吾之金明急急如律令勑右呪了取西方氣一口吹在木杖上但是一切木用之受持如此每日隨行如梨木甚妙勿令婦人入手受持四十九日東南立想三魂神幽精如自己面貌裝著衣服如自己與梨杖相似以在庚辛地上還魁斗而走不得回顧便行百里却呼之曰幽精幽精隱吾之身得吾呼召速來降靈如此呼之功立至矣水解符以壬癸月壬癸日壬癸時靜室中焚香一爐依前法丁上面南叩齒三十六通書符一道念呪七遍取氣一口吹符上閉目窨氣一口吞之用淨水七口咽之呪曰北方壬癸名號玄武水府之神黃公生土土公之坐水源守護急急如律令勑右用此法如前要解法時立於水位面比丁立呪七遍取中央氣一口吹在足鞋上想三魂神應之鞋上前北後南放之禹步從前便行不得回視千里無蹤當日要解將右鞋沉水即便行行日呼魂神却隨自己身來人只見落水死也火解符以丙丁月丙丁日丙丁時靜室中焚香面正南丁立叩齒三十六通呪七遍書符一道吞之淨水七口咽之呪曰南方火神丙丁之名吾帶四靈熒惑所停吾身到處火炎隱形急急如律令勑右法如此取自志誠受持四十九日如要解時用梨杖受持四十九日如逢刀兵災難便解左手將刀劎右手挾梨杖丁立坎位面向正南呪七遍取氣一口吹在梨杖上去梨杖投火中後用劎尖直下火中便斫窨氣而行解猛過即身火不能侵人只見投火而死也土解符以戊己月戊己日戊己時靜室中焚香一爐丁立巽地面東南朱書符一道呪七遍依前法書香上度閉目窨氣吞之呪曰中央戊己萬神朝禮名號勾陳聚散無滯吾今變化隱於天地急急如律令勑右法凡用依前用受持四十九日足如要假時左千持劔面向正南丁立叩齒二十四通呪七遍取本胃氣一口吹在彼中隨所而便面前頭上拋擲之於劔便行想三魂神亦依前法三魂神覆蓋之不得回頭百里面呼之三魂即至去還自己遇災難而解右以前後法符呪每件並是神仙祕法不得妄傳一人如要目用受持用朱篆符逐日依前法吞之一道清淨焚香煙處志誠禱祝將筆香上度過篆符祝筆呪曰神筆靈靈啓告上清六甲扶衛時祛六丁吾今書篆隱吾之身逢金金隨逢火火停土中隱匿天皇勑聖急急如律令此法每篆符時先呪筆上七次香上度過方書符此乃祕密之文勿傳非人罪及七祖九玄戒之戒之天衣道天衣者取五月五日首生男子台衣如無即但以五月五日取衣皆是汲以淨水洗之懸之於北隂下前七月七日苦瓠一箇以衣包之乃懸於北隂隂乾仍於當日朱砂書符於絳帛廣七寸褁之同安其所百日取之置於懷中以行人間無有識者其愼佩懷之勿置於隂陽厭穢之所勿令不潔人見之太微金闕昊天上帝二遁入冥昔太乙真君九天聖母下降崆峒授之元皇使帝釋敕群臣同升九天因留斯文傳教於世夫人欲修道切須斷生殺除姦妄去貪嫉妬忌五腥三厭之物其餘事不在禁戒中故聖人曰至道不煩了道若遇此書即得入生出死昔皇帝授九天聖母河圖式太乙宫丁甲之遁形既知隂陽局式二遁門竒之要然後修之故身得神仙畢矣陽遁法桂子人萬萬人陳中隱而不見以五月五日午時取黃牛膽一枚同官桂三指闊二寸四分長半指厚者去其粗當日於牛膽前望日念呪三遍望北取氣三口吹桂膽上將桂塞入膽中於靜室中不得人見及六畜婦人見隂乾一百日取出刻成人形長一寸二分以粉塗桂人面目口鼻及二七日以錦囊盛之如用念呪三遍取氣一口吹人上執入陳中萬萬人不見矣呪日太隂幽冥以使吾形雲霧罩體二避日精急急如律令欲多人不見者放頭上為老翁目中為老母耳中為幼女鼻中為丘塜放額及頦上為童兒放胸中為飛鳥放背上為牛馬放尾閭為清澗放尻隂上為洞水中出足躡者日行千里還者復入囊中後所作依應也隂遁法白楊木人於五月五日午時於注水㨂採白楊樹無蛀者西北採柳木並約其形一體截之一寸徑三寸圍者不得令婦人孝子見之安靜室內至度夏至日令雕匠預先齊戒密室雕作一人長一寸二分如小指大衣冠結束如己身形一般用錦為衣衣之仍用錦袋盛之常帶身邊左畔取乙酉日丑時披衣起向東定氣叩齒三十六通取此木人左手執念呪曰天圓地方我處中央太乙使我與我同藏隨我作用往還無妨遁形於世常侍我傍急急如太一真人律令念呪七遍然後收木人於袋中後乙酉日又如此作凡經七箇乙酉日當遁得我形七如隱時左手執人念呪曰天與我機共你相隨你藏我隱免中人知莫與我視唯我唯你太上使我立隱於己急急如太一真人律令念呪三遍了當隱了形仍安木人於袋中如不要急時以右手執木人即誦隱形呪曰天上倉倉地下皇皇我隱其中感爾相從遁形至妙當還我蹤太上之念莫乎匆匆急急如太一真人律令勑默念三遍了却將木人于袋中復作依然太上三辟五解祕法
